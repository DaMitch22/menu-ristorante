<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carta dei Gin - Da Mitch</title>
    <style>
        /* Reset base per eliminare i margini */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111; /* Sfondo scuro elegante, perfetto per un locale */
        }

        /* Contenitore principale del PDF */
        .pdf-container {
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Pulsante di sicurezza fisso in basso se il PDF non dovesse caricarsi su alcuni vecchi telefoni */
        .fallback-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #d4af37; /* Colore oro/bronzo elegante */
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 14px;
            z-index: 9999;
            display: none; /* Nascosto di default, si può attivare se serve */
        }

        /* Ottimizzazione per mobile: mostra il pulsante solo su schermi piccoli come salvagente */
        @media (max-width: 768px) {
            /* Se vuoi che il pulsante di scaricamento sia sempre visibile su mobile, scommenta la riga sotto */
            /* display: block; */
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <iframe src="CartaGin-DaMitch.pdf#toolbar=0&navpanes=0&scrollbar=0" allow="fullscreen">
            <p>Il tuo browser non supporta la visualizzazione dei PDF. 
               <a href="CartaGin-DaMitch.pdf">Clicca qui per scaricare il menu.</a>
            </p>
         iframe>
    </div>

    <a href="CartaGin-DaMitch.pdf" class="fallback-btn" target="_blank">Apri Menu a Schermo Intero</a>

</body>
</html>
